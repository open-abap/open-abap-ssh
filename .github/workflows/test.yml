name: test

on:
  push:
    branches:
      - main
  pull_request:

env:
  OPENSSH_IMAGE: lscr.io/linuxserver/openssh-server@sha256:deec9e402eb9a656de1749c3ea93e99478a565cf187ecfb051f8446d93b12483

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm test

  encrypted-transport:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm run integration:transport

  password-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm run integration:auth
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test

  command-exec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Allow time for pure-ABAP RSA verification
      run: |
        container=$(docker ps --filter publish=2222 -q)
        docker exec "$container" sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'RekeyLimit 1K 1h' >> /config/sshd/sshd_config"
        docker restart "$container"
    - run: npm run integration:exec
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test
        OASSH_EXPECT_REKEY: "1"
        OASSH_EXPECT_STRICT_KEX: "1"

  interactive-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require the durable interactive-shell algorithm set
      run: |
        docker exec openssh sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'KexAlgorithms curve25519-sha256' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'Ciphers aes128-ctr' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'HostKeyAlgorithms rsa-sha2-256' >> /config/sshd/sshd_config"
        docker restart openssh
    - run: npm run integration:shell
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test

  group14-exec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require group14 with a long login grace period
      run: |
        container=$(docker ps --filter publish=2222 -q)
        docker exec "$container" sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'KexAlgorithms diffie-hellman-group14-sha256' >> /config/sshd/sshd_config"
        docker restart "$container"
    - run: npm run integration:exec
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test
        OASSH_EXPECT_KEX: diffie-hellman-group14-sha256
        OASSH_EXPECT_STRICT_KEX: "1"

  chachapoly-exec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require OpenSSH ChaCha20-Poly1305
      run: |
        container=$(docker ps --filter publish=2222 -q)
        docker exec "$container" sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'Ciphers chacha20-poly1305@openssh.com' >> /config/sshd/sshd_config"
        docker restart "$container"
    - run: npm run integration:exec
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test
        OASSH_EXPECT_CIPHER: chacha20-poly1305@openssh.com
        OASSH_EXPECT_STRICT_KEX: "1"

  ed25519-host-exec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require Ed25519 host signatures
      run: |
        container=$(docker ps --filter publish=2222 -q)
        docker exec "$container" sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec "$container" sh -c "echo 'HostKeyAlgorithms ssh-ed25519' >> /config/sshd/sshd_config"
        docker restart "$container"
    - run: npm run integration:exec
      env:
        OASSH_USER: test
        OASSH_PASSWORD: test
        OASSH_EXPECT_HOST_KEY: ssh-ed25519
        OASSH_EXPECT_STRICT_KEX: "1"

  sftp-files:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require the durable SFTP algorithm set and install fixtures
      run: |
        docker exec openssh sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'KexAlgorithms curve25519-sha256' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'Ciphers aes128-ctr' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'HostKeyAlgorithms rsa-sha2-256' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "printf 'open-abap-sftp\000\377' > /config/sftp-fixture.bin"
        docker exec openssh mkdir -p /config/oassh-list
        docker exec openssh sh -c "printf a > /config/oassh-list/a.bin"
        docker exec openssh sh -c "printf bb > /config/oassh-list/b.txt"
        docker exec openssh chown -R 1000:1000 /config/sftp-fixture.bin /config/oassh-list
        docker restart openssh
    - run: npm run build
    - name: Download binary fixture
      run: node integration/sftp.mjs
    - name: Upload and independently download a multi-chunk binary fixture
      run: node integration/sftp-upload.mjs
    - name: STAT binary fixture
      run: node integration/sftp-stat.mjs
    - name: LSTAT binary fixture
      run: node integration/sftp-stat.mjs
      env:
        OASSH_SFTP_LSTAT: "1"
    - name: List directory and parse NAME attributes
      run: node integration/sftp-list.mjs

  sftp-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require the durable SFTP algorithm set and install fixtures
      run: |
        docker exec openssh sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'KexAlgorithms curve25519-sha256' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'Ciphers aes128-ctr' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'HostKeyAlgorithms rsa-sha2-256' >> /config/sshd/sshd_config"
        docker exec openssh mkdir -p /config/oassh-mutations
        docker exec openssh sh -c "printf source > /config/oassh-mutations/source.bin"
        docker exec openssh chown -R 1000:1000 /config/oassh-mutations
        docker restart openssh
    - run: npm run build
    - name: Normalize paths and exercise STATUS-checked mutations
      run: node integration/sftp-mutations.mjs

  sftp-session:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Require the durable SFTP algorithm set and install fixtures
      run: |
        docker exec openssh sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'RekeyLimit 1G 1h' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'KexAlgorithms curve25519-sha256' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'Ciphers aes128-ctr' >> /config/sshd/sshd_config"
        docker exec openssh sh -c "echo 'HostKeyAlgorithms rsa-sha2-256' >> /config/sshd/sshd_config"
        docker exec openssh mkdir -p /config/oassh-list /config/oassh-session
        docker exec openssh sh -c "printf a > /config/oassh-list/a.bin"
        docker exec openssh sh -c "printf bb > /config/oassh-list/b.txt"
        docker exec openssh sh -c "printf source > /config/oassh-session/source.bin"
        docker exec openssh chown -R 1000:1000 /config/oassh-list /config/oassh-session
        docker restart openssh
    - run: npm run build
    - name: List, download, stat and rename over a single SFTP session
      run: node integration/sftp-session.mjs

  # Interop smoke test against the public Rebex test server, an independent
  # non-OpenSSH implementation. Non-blocking: third-party uptime and rate
  # limits are outside our control.
  rebex-public:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - run: npm ci
    - run: npm run integration:rebex

  publickey-auth-exec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/openssh
      with:
        image: ${{ env.OPENSSH_IMAGE }}
        password-access: "false"
    - uses: actions/setup-node@v6
    - run: npm ci
    - name: Authorize RFC 8032 Ed25519 test key
      run: |
        container=$(docker ps --filter publish=2222 -q)
        docker exec "$container" mkdir -p /config/.ssh
        docker exec "$container" sh -c "echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINdamAGCsQq31Uv+08lkBzoO4XLz2qYjJa8CGmj3B1Ea' > /config/.ssh/authorized_keys"
        docker exec "$container" chmod 600 /config/.ssh/authorized_keys
        docker exec "$container" sh -c "echo 'LoginGraceTime 600' >> /config/sshd/sshd_config"
        docker restart "$container"
    - run: npm run integration:exec
      env:
        OASSH_USER: test
        OASSH_PASSWORD: ""
        OASSH_PRIVATE_SEED: 9D61B19DEFFD5A60BA844AF492EC2CC44449C5697B326919703BAC031CAE7F60
        OASSH_EXPECT_STRICT_KEX: "1"
